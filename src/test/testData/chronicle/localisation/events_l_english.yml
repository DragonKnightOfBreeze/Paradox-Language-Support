l_english:
 hello_world.1.title:0 "Hello, world"
 hello_world.1.desc:0 "The being we found slumbering here - we have not yet known (or decided) what to call her - has awakened. \nThis is such a special moment, and we are ready for it. We are going to send her our regards."

 hello_world.2.title:0 "Hello, the real world"
 hello_world.2.desc:0 "We are already familiar with that tale: the being that heralds hope, the being that symbolizes dreams...\nNow, such a being has stepped into the real world, and is within reach."
