<body>
  报告事件脚本文件中的（位于事件声明中的）不匹配事件命名空间的事件ID。
  <p>说明：</p>
  <ul>
    <li>此代码检查是启发式的，可能存在误报。</li>
    <li>此代码检查未通过时，不一定意味着会引发游戏引擎层面的异常。</li>
    <li>实际上，事件脚本文件中可以不声明或者声明多个事件命名空间，事件ID不需要匹配同文件中的先前最后声明的事件命名空间。</li>
  </ul>
  <!-- tooltip end -->
  <p>
    在事件脚本文件中，
    事件 ID 作为事件定义的键或者属性（名为 <code>id</code>）的值声明，
    事件命名空间作为文件根属性（名为 <code>namespace</code>）在事件定义前声明。
  </p>
  <p>
    事件脚本文件是指扩展名为 <code>.txt</code>，位于 <code>events</code> 目录下的脚本文件。
  </p>
</body>
