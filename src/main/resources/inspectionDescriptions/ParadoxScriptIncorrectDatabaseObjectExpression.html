<body>
  Reports incorrect database object expressions.
  <!-- tooltip end -->
  <p>
    A database object expression is a script expression matching data type
    <a href="https://windea.icu/Paradox-Language-Support/ref-config-format.html#data-type-database-object">DatabaseObject</a>.
  </p>
  <p>Example:</p>
  <ul>
    <li><code>civic:some_civic</code></li>
    <li><code>civic:some_civic:some_swapped_civic</code></li>
    <li><code>job:job_soldier</code></li>
  </ul>
</body>
