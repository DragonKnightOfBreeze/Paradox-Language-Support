<body>
  报告不正确的标签集合表达式。
  <!-- tooltip end -->
  <p>
    标签集合表达式（TagsExpression）是指匹配数据类型
    <a href="https://windea.icu/Paradox-Language-Support/ref-config-format.html#data-type-tags">Tags</a>
    的脚本表达式。
  </p>
  <p>示例：</p>
  <ul>
    <li><code>"tag1,tag2"</code></li> - 注意需要用双引号括起。
    <li><code>"tag1,not(tag2)"</code></li> - 条件变体。
  </ul>
</body>
