<html>
<body>
  Reports safe scope calls in script files, which can be replaced with explicit form.
  <p>
    Check on grammar level.
  </p>
  <p>
    Supported for all game types with any safe call operator (<code>?=</code> or <code>? =</code>).
  </p>
  <!-- tooltip end -->
  <p>Example:</p>
  <pre><code class="language-paradox_script">
# [CK3/VIC3/EU5] before
owner ?= v

# [Stellaris] before
owner? = v

# after
exists = owner
owner = { ... }
</code></pre>
</body>
</html>
