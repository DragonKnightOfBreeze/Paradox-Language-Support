<html>
<body>
  报告不正确的路径引用表达式。
  <p>
    如果路径引用表达式不符合匹配表达式的由选项 <code>## file_extensions</code> 声明的特定文件扩展名，则视为不正确。
  </p>
  <p>
    参见：<a href="https://windea.icu/Paradox-Language-Support/ref-config-format.html#faq-file-extensions">如何在规则文件中指定路径引用的扩展名</a>
  </p>
  <!-- tooltip end -->
  <p>
    路径引用表达式是指匹配数据类型
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-icon">Icon</a>、
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-file-path">FilePath</a>、
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-file-name">FileName</a> 或
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-absolute-file-path">AbsoluteFilePath</a>
    的脚本表达式，代表文件路径。
  </p>
</body>
</html>
