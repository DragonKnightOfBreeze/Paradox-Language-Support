<html>
<body>
  报告解析结果存在冲突的表达式。
  <p>
    当表达式关联的块值（即 <code>{...}</code>）匹配多个来源不同的规则表达式时，
    该表达式将被视为存在冲突。
  </p>
  <!-- tooltip end -->
  <p>
    此检查适用于以下两种情况：
  </p>
  <ul>
    <li>作为<b>键表达式</b>时，其对应的值为块，且该块匹配多个规则表达式。</li>
    <li>作为<b>值表达式</b>时，其本身为块，且该块匹配多个规则表达式。</li>
  </ul>
  <p>
    常见场景：在触发器上下文中，链式表达式（如 <code>var:xxx</code>）可能同时匹配
    <code>scope_field</code> 和 <code>value_field</code> 别名，
    两者期望的块结构不同（触发器子句 VS 算术运算），因此被报告为冲突。
  </p>
  <p>
    被覆盖的规则（其子句条目是另一规则的超集）会自动排除在冲突检测之外。
  </p>
</body>
</html>
