  报告不正确的脚本值引用表达式。
  <!-- tooltip end -->
  <p>
    脚本值引用表达式（ScriptValueReferenceExpression）是指匹配数据类型
    <a href="https://windea.icu/Paradox-Language-Support/ref-config-format.html#data-type-script-value-reference">ScriptValueReference</a>
    的脚本表达式。
  </p>
  <p>示例：</p>
  <ul>
    <li><code>some_sv</code></li>
    <li><code>some_sv|PARAM|VALUE|</code></li>
    <li><code>some_sv|P1|V1|P2|V2|</code></li>
  </ul>
</body>
