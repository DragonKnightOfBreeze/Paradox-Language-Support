  Reports unsupported recursions in script files.
  <p>Use following rules:</p>
  <ul>
    <li>Recursive scripted variable references are not supported.</li>
    <li>Recursive scripted trigger calls are not supported.</li>
    <li>Recursive scripted effect calls are not supported.</li>
  </ul>
