<body>
  报告脚本文件中的安全的作用域调用，可以被替换为显式形式。
  <p>
    检测于文法级别。
  </p>
  <p>
    适用于所有游戏类型和任意安全调用运算符（<code>?=</code> 或 <code>? =</code>）。
  </p>
  <!-- tooltip end -->
  <p>示例：</p>
  <pre><code class="language-paradox_script">
# [CK3/VIC3/EU5] before
owner ?= v

# [Stellaris] before
owner? = v

# after
exists = owner
owner = { ... }
</code></pre>
</body>
