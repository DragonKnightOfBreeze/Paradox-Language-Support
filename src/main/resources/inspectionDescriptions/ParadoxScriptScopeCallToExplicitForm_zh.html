<body>
  报告安全形式的作用域调用，可以被替换为显式形式。
  <p>
    检测于文法级别。
  </p>
  <p>
    对于所有游戏类型和任意安全调用运算符（<code>?=</code> 或 <code>? =</code>）均适用。
  </p>
  <!-- tooltip end -->
  <p>示例：</p>
  <pre><code class="language-paradox_script">
# [CK3/VIC3/EU5] before
owner ?= { ... }

# [Stellaris] before
owner? = { ... }

# after
exists = owner
owner = { ... }
</code></pre>
</body>
</html>
