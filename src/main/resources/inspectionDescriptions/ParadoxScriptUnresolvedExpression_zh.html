  报告脚本文件中无法解析的表达式。
  <p>
    在定义声明中，以下情况将视为无法解析：
  </p>
  <ul>
    <li>作为键表达式，但未匹配任何规则表达式。</li>
    <li>作为键表达式，但其值表达式未匹配任何规则表达式。</li>
    <li>作为值表达式，但未匹配任何规则表达式。</li>
  </ul>
  <p>
    <strong>备注：</strong>
    此代码检查基于规则文件，如果产生了误报，通常表明当前游戏类型的规则文件是不完善的。
    考虑按需禁用或抑制此代码检查，或者<a href="https://github.com/DragonKnightOfBreeze/Paradox-Language-Support#contributing-config-files">贡献规则</a>。
  </p>
