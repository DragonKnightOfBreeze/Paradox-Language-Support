<html>
<body>
  报告不正确的值字段表达式。
  <!-- tooltip end -->
  <p>
    值字段表达式是指匹配数据类型
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-value-field">ValueField</a> 或
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-int-value-field">IntValueField</a>
    的脚本表达式，分别作为
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-variable-field">VariableField</a> 或
    <a href="https://windea.icu/Paradox-Language-Support/zh/ref-config-format.html#data-type-int-variable-field">IntVariableField</a>
    的超集。
  </p>
  <p>示例：</p>
  <ul>
    <li><code>value:some_sv</code></li>
    <li><code>root.owner.value:some_sv</code></li>
    <li><code>value:some_sv|PARAM|VALUE|</code></li>
    <li><code>root.owner.some_variable</code></li>
  </ul>
</body>
</html>
