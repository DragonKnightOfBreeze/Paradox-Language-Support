  报告不正确的动态值表达式。
  <!-- tooltip end -->
  <p>
    动态值表达式（DynamicValueExpression）是指匹配数据类型
    <a href="https://windea.icu/Paradox-Language-Support/ref-config-format.html#data-type-value">Value</a>、
    <a href="https://windea.icu/Paradox-Language-Support/ref-config-format.html#data-type-value-set">ValueSet</a> 或
    <a href="https://windea.icu/Paradox-Language-Support/ref-config-format.html#data-type-dynamic-value">DynamicValue</a>
    的脚本表达式。
  </p>
  <p>示例：</p>
  <ul>
    <li><code>some_flag</code></li>
    <li><code>some_flag@root.owner</code></li>
  </ul>
